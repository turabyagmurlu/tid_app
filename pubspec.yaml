name: tid_app
description: "Türk İşaret Dili (TİD) Öğrenme Uygulaması — çift el standardı, çift açılı video, ayna modu ve TİD gramer alıştırmaları."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Durum yönetimi (State Management) — Bölüm 3'teki blocs/ klasörüne uygun
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Firebase — İçerik: Firestore, Videolar: Storage (Bölüm 4 tercihi)
  firebase_core: ^2.31.0
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.5

  # Medya
  video_player: ^2.8.6
  camera: ^0.10.6

  intl: ^0.19.0

  # Harici sözlük linklerini açmak için (SpreadTheSign / resmî TİD sözlüğü)
  url_launcher: ^6.2.6

  # Kalıcı yerel kayıt (ilerleme, aralıklı tekrar, ayarlar)
  shared_preferences: ^2.2.3

  # Dost, yuvarlak tipografi (Nunito)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/seed/
